services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openvpn
      POSTGRES_PASSWORD: openvpn
      POSTGRES_DB: openvpn_manager
    volumes:
      - openvpn_manager_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvpn -d openvpn_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Surfaced in the UI via /system/info. Set on the host before `up --build`,
        # e.g. GIT_COMMIT=$(git rev-parse --short HEAD) docker compose up -d --build
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    env_file: .env
    # Shared auth state (token blacklist + login lockout) lives in Redis so it
    # survives restarts and is consistent across workers/replicas. This overrides
    # any REDIS_URL in .env.
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backups:/app/backups
      - ./private.pem:/app/private.pem:ro
      - ./public.pem:/app/public.pem:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
    # TLS is expected to be terminated by an external reverse proxy in front of
    # this service. The nginx image here serves plain HTTP on :80 only.
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  openvpn_manager_db_data:
    external: true
